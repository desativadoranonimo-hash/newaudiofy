<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiofy — Converter Vídeo para MP3</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128.png">
    <link rel="apple-touch-icon" href="/favicon-128.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0B0E14;
            --surface: #141720;
            --surface2: #1C2030;
            --border: rgba(255,255,255,0.08);
            --border-focus: rgba(139,92,246,0.5);
            --text: #E2E8F0;
            --muted: #64748B;
            --subtle: #475569;
            --violet: #8B5CF6;
            --violet-dark: #7C3AED;
            --violet-light: #C4B5FD;
            --green: #10B981;
            --green-dark: #059669;
            --red: #EF4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Nav ── */
        nav {
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
        }
        .logo span { color: var(--violet); }

        .nav-links { display: flex; gap: 0.75rem; align-items: center; }

        .nav-link {
            color: var(--muted);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-link:hover { color: var(--violet-light); }

        .nav-btn {
            background: var(--violet);
            color: #fff;
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: var(--violet-dark); }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            gap: 2.5rem;
        }

        /* ── Hero ── */
        .hero {
            text-align: center;
            max-width: 600px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(139,92,246,0.12);
            border: 0.5px solid rgba(139,92,246,0.3);
            color: var(--violet-light);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            margin-bottom: 1.4rem;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--violet);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.1rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        h1 em {
            font-style: normal;
            background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.97rem;
            line-height: 1.65;
        }

        /* ── Input area ── */
        .input-wrap { width: 100%; max-width: 640px; }

        .input-box {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 20px;
            gap: 8px;
            transition: border-color 0.2s;
        }
        .input-box:focus-within { border-color: var(--border-focus); }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            min-width: 0;
            padding: 10px 0;
        }
        .input-box input::placeholder { color: var(--subtle); }

        .btn-convert {
            background: var(--violet);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1.4rem;
            font-size: 0.88rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-convert:hover { background: var(--violet-dark); transform: translateY(-1px); }
        .btn-convert:active { transform: translateY(0); }
        .btn-convert:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .platforms {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 0.85rem;
            flex-wrap: wrap;
        }
        .plat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--subtle);
        }
        .plat-dot { width: 5px; height: 5px; border-radius: 50%; }

        /* ── Loader ── */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .loader.visible { display: flex; }

        /* ── Result card ── */
        .card {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 18px;
            padding: 1.25rem;
            width: 100%;
            max-width: 640px;
            display: none;
        }
        .card.visible { display: block; }

        .card-top {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .thumb {
            width: 126px;
            height: 72px;
            object-fit: cover;
            border-radius: 10px;
            background: var(--surface2);
            flex-shrink: 0;
        }
        .thumb-placeholder {
            width: 126px;
            height: 72px;
            border-radius: 10px;
            background: var(--surface2);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--subtle);
            font-size: 1.6rem;
        }

        .meta { flex: 1; min-width: 0; }

        .video-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #F1F5F9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .video-dur {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .dl-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select {
            background: var(--bg);
            border: 0.5px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 0.52rem 0.8rem;
            color: #CBD5E1;
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:focus { border-color: rgba(139,92,246,0.4); }

        .btn-dl {
            flex: 1;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.55rem 1rem;
            font-size: 0.87rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: filter 0.2s, transform 0.15s;
        }
        .btn-dl:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-dl:active { transform: translateY(0); }
        .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }

        .dl-status {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 10px;
            padding: 0.5rem 0.85rem;
            background: rgba(16,185,129,0.06);
            border-radius: 8px;
            border: 0.5px solid rgba(16,185,129,0.2);
        }
        .dl-status.visible { display: flex; }

        /* ── Spinner ── */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(139,92,246,0.2);
            border-top-color: var(--violet);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            flex-shrink: 0;
        }
        .spinner-lg {
            width: 28px;
            height: 28px;
            border-width: 3px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Features ── */
        .features {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feat {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            color: var(--subtle);
        }
        .feat-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(139,92,246,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 1.75rem;
            left: 50%;
            transform: translateX(-50%) translateY(14px);
            background: #1C1F2E;
            border: 0.5px solid rgba(239,68,68,0.35);
            color: #FCA5A5;
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            font-size: 0.83rem;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        footer {
            padding: 1.5rem;
            text-align: center;
            color: #334155;
            font-size: 0.72rem;
            border-top: 0.5px solid rgba(255,255,255,0.04);
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            nav { padding: 1rem 1.25rem; }
            main { padding: 2rem 1.25rem; gap: 2rem; }
            h1 { font-size: 1.9rem; }
            .input-box { padding: 5px 5px 5px 14px; border-radius: 12px; }
            .btn-convert { padding: 0.6rem 1rem; font-size: 0.82rem; }
            .card-top { flex-direction: column; }
            .thumb, .thumb-placeholder { width: 100%; height: 160px; }
            .features { gap: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AUDIO<span>FY</span></div>
        <div class="nav-links">
            <a href="#" class="nav-link">Termos</a>
            <button class="nav-btn">✦ Premium</button>
        </div>
    </nav>

    <main>

        <div class="hero">
            <h1>Música sem limites,<br><em>direto no seu bolso.</em></h1>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <input id="urlInput" type="text" placeholder="Cole o link do YouTube ou TikTok..." autocomplete="off">
                <button class="btn-convert" id="btnAction" onclick="analyzeVideo()">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M8 1v9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M5 7l3 3 3-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M3 13h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    Converter
                </button>
            </div>
            <div class="platforms">
                <span class="plat"><span class="plat-dot" style="background:#FF0000"></span>YouTube</span>
                <span class="plat"><span class="plat-dot" style="background:#69C9D0"></span>TikTok</span>
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner spinner-lg"></div>
            Analisando link...
        </div>

        <div class="card" id="resultCard">
            <div class="card-top">
                <img id="thumb" class="thumb" src="" alt="" style="display:none">
                <div class="thumb-placeholder" id="thumbPlaceholder">♪</div>
                <div class="meta">
                    <div class="video-title" id="videoTitle">—</div>
                    <div class="video-dur" id="duration">—</div>
                    <div class="dl-row">
                        <select id="quality">
                            <option value="128">128 kbps</option>
                            <option value="192" selected>192 kbps · Padrão</option>
                            <option value="320">320 kbps · Alta qualidade</option>
                        </select>
                        <button class="btn-dl" id="btnDownload" onclick="startDownload()">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <path d="M8 2v8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                                <path d="M5 7l3 3 3-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M3 13h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                            Baixar MP3
                        </button>
                    </div>
                    <div class="dl-status" id="downloadStatus">
                        <div class="spinner"></div>
                        <span>Preparando o áudio, aguarde...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="feat"><div class="feat-icon">⚡</div>Rápido e grátis</div>
            <div class="feat"><div class="feat-icon">🎵</div>Até 320 kbps</div>
            <div class="feat"><div class="feat-icon">🔒</div>Sem cadastro</div>
        </div>

    </main>

    <div id="toast"></div>

    <footer>
        © <span id="year"></span> Audiofy · Use com responsabilidade · Respeite os direitos autorais
    </footer>

    <script src="script.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
